<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>API Test</title>
  <style>
    body { font-family: monospace; padding: 2rem; background: #0f172a; color: #e2e8f0; }
    button { padding: 0.75rem 1.5rem; background: #6366f1; color: white; border: none; border-radius: 8px; cursor: pointer; margin: 0.5rem; font-size: 1rem; }
    pre { background: #1e293b; padding: 1rem; border-radius: 8px; overflow-x: auto; margin-top: 1rem; white-space: pre-wrap; word-break: break-word; }
    .ok { color: #34d399; }
    .err { color: #f87171; }
  </style>
</head>
<body>
  <h2>🧪 API Test Paneli</h2>
  <p>Butonlara tıklayarak hangi modülün çalışıp çalışmadığını test edin.</p>

  <button onclick="testWriting()">✍️ Writing Test</button>
  <button onclick="testReading()">📖 Reading Test</button>
  <button onclick="testListening()">🎧 Listening Test</button>
  <button onclick="testSpeakingPrompt()">🎤 Speaking Prompt Test</button>
  <button onclick="testWebReader()">🌍 Web Reader Test</button>

  <pre id="output">Sonuç burada görünecek...</pre>

  <script type="module">
    import { analyzeWriting, generateReadingPassage, generateListeningContent, generateSpeakingPrompt, simplifyArticle } from './assets/js/api.js';

    const out = document.getElementById('output');
    const log = (msg, ok = true) => {
      out.innerHTML += `\n<span class="${ok ? 'ok' : 'err'}">${msg}</span>`;
    };

    window.testWriting = async () => {
      out.innerHTML = '⏳ Writing analiz ediliyor...';
      try {
        const r = await analyzeWriting('Yesterday I go to market and buyed vegetables.');
        log('✅ Writing OK:\n' + JSON.stringify(r, null, 2));
      } catch(e) {
        log('❌ Writing HATA: ' + e.message, false);
      }
    };

    window.testReading = async () => {
      out.innerHTML = '⏳ Reading metni üretiliyor...';
      try {
        const r = await generateReadingPassage('technology', 'B1');
        log('✅ Reading OK:\n' + JSON.stringify(r, null, 2));
      } catch(e) {
        log('❌ Reading HATA: ' + e.message, false);
      }
    };

    window.testListening = async () => {
      out.innerHTML = '⏳ Listening içeriği üretiliyor...';
      try {
        const r = await generateListeningContent('daily life', 'B1');
        log('✅ Listening OK:\n' + JSON.stringify(r, null, 2));
      } catch(e) {
        log('❌ Listening HATA: ' + e.message, false);
      }
    };

    window.testSpeakingPrompt = async () => {
      out.innerHTML = '⏳ Speaking prompt üretiliyor...';
      try {
        const r = await generateSpeakingPrompt('travel');
        log('✅ Speaking Prompt OK:\n' + JSON.stringify(r, null, 2));
      } catch(e) {
        log('❌ Speaking HATA: ' + e.message, false);
      }
    };

    window.testWebReader = async () => {
      out.innerHTML = '⏳ Web Reader basitleştiriyor...';
      try {
        const r = await simplifyArticle('The proliferation of artificial intelligence in contemporary society has engendered multifaceted socioeconomic ramifications.', 'B1');
        log('✅ Web Reader OK:\n' + JSON.stringify(r, null, 2));
      } catch(e) {
        log('❌ Web Reader HATA: ' + e.message, false);
      }
    };
  </script>
</body>
</html>
